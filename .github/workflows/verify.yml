name: Verify

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'hotfix/**'
      - 'release/**'
  pull_request:

jobs:
  backend:
    name: Backend verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend dependencies
        run: uv sync

      - name: Lint backend
        run: uv run ruff check .

      - name: Type-check backend
        run: uv run mypy app/

      - name: Test backend
        run: uv run pytest -q

  frontend:
    name: Frontend verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm lint

      - name: Type-check frontend
        run: pnpm typecheck

      - name: Build frontend
        run: pnpm build
