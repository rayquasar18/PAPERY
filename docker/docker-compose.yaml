# Docker Compose — Enterprise full stack
# Usage: docker compose -f docker/docker-compose.yaml up -d

name: papery

services:
  db:
    image: postgres:17-alpine
    container_name: papery-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-papery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-papery_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-papery}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-papery} -d ${POSTGRES_DB:-papery}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: papery-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-papery_redis_dev}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-papery_redis_dev} ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:-papery_redis_dev}

  minio:
    image: minio/minio:latest
    container_name: papery-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: papery-backend
    restart: unless-stopped
    env_file:
      - ../backend/.env
    ports:
      - "8200:8000"
    environment:
      FRONTEND_URL: http://localhost:3200
      CORS_ORIGINS: '["http://localhost:3200","http://127.0.0.1:3200"]'
      OAUTH_REDIRECT_BASE_URL: http://localhost:8200
      STRIPE_SUCCESS_URL: http://localhost:3200/billing/success
      STRIPE_CANCEL_URL: http://localhost:3200/billing/cancel
      STRIPE_PORTAL_RETURN_URL: http://localhost:3200/account
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-papery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-papery_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-papery}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-papery_redis_dev}
      REDIS_CACHE_HOST: redis
      REDIS_CACHE_PORT: 6379
      REDIS_CACHE_PASSWORD: ${REDIS_PASSWORD:-papery_redis_dev}
      REDIS_QUEUE_HOST: redis
      REDIS_QUEUE_PORT: 6379
      REDIS_QUEUE_PASSWORD: ${REDIS_PASSWORD:-papery_redis_dev}
      REDIS_RATE_LIMIT_HOST: redis
      REDIS_RATE_LIMIT_PORT: 6379
      REDIS_RATE_LIMIT_PASSWORD: ${REDIS_PASSWORD:-papery_redis_dev}
      MINIO_ENDPOINT: minio:9000
      MINIO_SECURE: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET_NAME: papery
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-papery}:${POSTGRES_PASSWORD:-papery_dev_password}@db:5432/${POSTGRES_DB:-papery}
      ASYNC_DATABASE_URI: postgresql+asyncpg://${POSTGRES_USER:-papery}:${POSTGRES_PASSWORD:-papery_dev_password}@db:5432/${POSTGRES_DB:-papery}
      SQLALCHEMY_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-papery}:${POSTGRES_PASSWORD:-papery_dev_password}@db:5432/${POSTGRES_DB:-papery}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      APP_ENV: production
      ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: papery-frontend
    restart: unless-stopped
    ports:
      - "3200:3000"
    environment:
      NEXT_PUBLIC_BACKEND_API_URL: http://localhost:8200
      NEXT_PUBLIC_API_VERSION: v1
      BACKEND_API_URL: http://backend:8000
      API_VERSION: v1
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
